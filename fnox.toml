# fnox secrets config
# secret 値は age 公開鍵で暗号化された暗号文（git コミット可）。
# 復号鍵は macOS keychain (service=fnox, account=age-key) から auth_command で取得。

[providers]
age = { type = "age", recipients = ["age1rvnrau0swu4tds583lrzgurxpv20ylvku5tgr2tg3jnqxe3gndfs0m6jp0"], auth_command = "security find-generic-password -s fnox -a age-key -w" }

[mcp]
# Claude(AI エージェント)に dev:preview 等で使わせるが raw 値は見せない:
# tools=exec のみ＝get_secret 不可、redact_output で出力からも伏せる。
secrets = ["AI_GATEWAY_API_KEY", "BETTER_AUTH_SECRET", "GOOGLE_CLIENT_SECRET", "BETTER_AUTH_URL", "GOOGLE_CLIENT_ID"]
tools = ["exec"]
redact_output = true

[secrets]
BETTER_AUTH_SECRET= { provider = "age", value = "" }
BETTER_AUTH_URL= { provider = "age", value = "" }
GOOGLE_CLIENT_ID= { provider = "age", value = "" }
GOOGLE_CLIENT_SECRET= { provider = "age", value = "" }
AI_GATEWAY_API_KEY= { provider = "age", value = "" }
